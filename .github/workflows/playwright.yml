name: Playwright E2E

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (generate HTML report)
        run: npm run test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_PATH: ${{ secrets.LOGIN_PATH }}
          TRANSLATOR_EMAIL: ${{ secrets.TRANSLATOR_EMAIL }}
          TRANSLATOR_PASSWORD: ${{ secrets.TRANSLATOR_PASSWORD }}

      - name: Upload Playwright HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (playwright-report)
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Mattermost with Pages link
        if: always()
        run: node scripts/mattermost-dm-test.js
        env:
          MM_URL: ${{ secrets.MM_URL }}
          MM_BOT_TOKEN: ${{ secrets.MM_BOT_TOKEN }}
          MM_DM_USERS: ${{ secrets.MM_DM_USERS }}
          MM_DM_MESSAGE: "[View Report](${{ steps.deployment.outputs.page_url }})"
